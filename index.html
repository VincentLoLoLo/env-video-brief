<script>
(function(){
  var c=document.getElementById("bg-canvas"),ctx=c.getContext("2d");
  var orbs=[],W,H;
  function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;}
  resize(); window.addEventListener("resize",resize);
  var colors=["rgba(99,102,241,0.25)","rgba(168,85,247,0.2)","rgba(59,130,246,0.18)","rgba(236,72,153,0.12)","rgba(16,185,129,0.15)"];
  for(var i=0;i<5;i++){
    orbs.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*200+150,vx:(Math.random()-0.5)*0.3,vy:(Math.random()-0.5)*0.3,c:colors[i]});
  }
  function draw(){
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle="#0c0f1a";ctx.fillRect(0,0,W,H);
    orbs.forEach(function(o){
      o.x+=o.vx;o.y+=o.vy;
      if(o.x<-o.r)o.x=W+o.r;if(o.x>W+o.r)o.x=-o.r;
      if(o.y<-o.r)o.y=H+o.r;if(o.y>H+o.r)o.y=-o.r;
      var g=ctx.createRadialGradient(o.x,o.y,0,o.x,o.y,o.r);
      g.addColorStop(0,o.c);g.addColorStop(1,"transparent");
      ctx.fillStyle=g;ctx.fillRect(o.x-o.r,o.y-o.r,o.r*2,o.r*2);
    });
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>

/* ═══ Confetti ═══ */

  const pieces = useMemo(() => Array.from({length:50},(_,i) => ({
    id:i,left:Math.random()*100,delay:Math.random()*2,dur:2+Math.random()*2,

  return (
    <div style={{position:"fixed",inset:0,zIndex:300,pointerEvents:"none",overflow:"hidden"}}>

/* ═══ Hooks ═══ */
function useAutoResize(ref, value) {
  useEffect(() => { const el = ref.current; if (!el) return; el.style.height = "auto"; el.style.height = Math.max(100, el.scrollHeight) + "px"; }, [value]);
}
function useSwipe(onLeft, onRight) {
  const startX = useRef(0), startY = useRef(0);
  return useMemo(() => ({
    onTouchStart: (e) => { startX.current = e.touches[0].clientX; startY.current = e.touches[0].clientY; },
    onTouchEnd: (e) => { const dx = e.changedTouches[0].clientX - startX.current; const dy = e.changedTouches[0].clientY - startY.current; if (Math.abs(dx) < 60 || Math.abs(dy) > Math.abs(dx) * 0.7) return; if (dx < 0) onLeft(); else onRight(); },
  }), [onLeft, onRight]);
}

/* ═══ App ═══ */
function App() {
  const [splash, setSplash] = useState(true);
  const [currentIndex, setCurrentIndex] = useState(-1);
  const [answers, setAnswers] = useState({});
  const [isComplete, setIsComplete] = useState(false);
  const [showOverview, setShowOverview] = useState(false);
  const [expandedPrompts, setExpandedPrompts] = useState(true);
  const [submitStatus, setSubmitStatus] = useState("idle");
  const [showSidebar, setShowSidebar] = useState(false);
  const [isWide, setIsWide] = useState(typeof window!=="undefined" && window.innerWidth >= 768);
  const [slideDir, setSlideDir] = useState("left");
  const [toastMsg, setToastMsg] = useState("");
  const [toastKey, setToastKey] = useState(0);
  const [showConfetti, setShowConfetti] = useState(false);
  const [overviewFilter, setOverviewFilter] = useState("all");
  const submittingRef = useRef(false);
  const textareaRef = useRef(null);
  const contentRef = useRef(null);

  useAutoResize(textareaRef, answers[currentIndex]);

  /* Splash screen */
  useEffect(() => { setTimeout(() => setSplash(false), 1800); }, []);

  useEffect(() => { const h = () => setIsWide(window.innerWidth >= 768); window.addEventListener("resize", h); return () => window.removeEventListener("resize", h); }, []);

  useEffect(() => {
    if (currentIndex >= 0) {
      setTimeout(() => { if(textareaRef.current) textareaRef.current.focus(); }, 150);
      if (contentRef.current) contentRef.current.scrollTop = 0;
    }
  }, [currentIndex]);

  useEffect(() => {
    try {
      const s = localStorage.getItem("env_video_answers");
      if (s) {
        const saved = JSON.parse(s);
        setAnswers(saved);
        /* Auto-resume: jump to last answered + 1 */
        const keys = Object.keys(saved).filter(k => saved[k] && saved[k].trim()).map(Number);
        if (keys.length > 0) {
          const lastIdx = Math.max(...keys);
          setTimeout(() => setCurrentIndex(Math.min(lastIdx + 1, questions.length - 1)), 1900);
        }
      }
    } catch(e) {}
  }, []);
  const saveTimerRef = useRef(null);
  useEffect(() => {
    clearTimeout(saveTimerRef.current);
    saveTimerRef.current = setTimeout(() => {
      try { localStorage.setItem("env_video_answers", JSON.stringify(answers));
        if (currentIndex >= 0 && Object.keys(answers).length > 0) { setToastMsg("已自動保存"); setToastKey(k => k + 1); }
      } catch(e) {}
    }, 800);
  }, [answers]);

  const total = questions.length;
  const answeredCount = useMemo(() => Object.keys(answers).filter(k => answers[k] && answers[k].trim()).length, [answers]);
  const currentQuestion = currentIndex >= 0 ? questions[currentIndex] : null;
  const sc = currentQuestion ? SC[currentQuestion.section] : null;
  const hasResume = useMemo(() => Object.keys(answers).length > 0, [answers]);
  const lastAnswered = useMemo(() => { for (let i = questions.length - 1; i >= 0; i--) { if (answers[i] && answers[i].trim()) return i; } return -1; }, [answers]);

  const goNext = useCallback(() => { setSlideDir("left"); if (currentIndex < total - 1) { setCurrentIndex(currentIndex + 1); setExpandedPrompts(true); } else { setIsComplete(true); } }, [currentIndex, total]);
  const goPrev = useCallback(() => { setSlideDir("right"); if (currentIndex > 0) { setCurrentIndex(currentIndex - 1); setExpandedPrompts(true); } else if (currentIndex === 0) { setCurrentIndex(-1); } }, [currentIndex]);
  const jumpTo = useCallback((i) => { setSlideDir(i > currentIndex ? "left" : "right"); setCurrentIndex(i); setShowOverview(false); setIsComplete(false); setExpandedPrompts(true); }, [currentIndex]);

  const cleanPrompt = (p) => p.replace(/[？？]$/, "");
  const isPromptSelected = (p) => { const cur = answers[currentIndex] || ""; return cur.split("\n").some(l => l.trim() === cleanPrompt(p)); };
  const handlePromptClick = (p) => {
    const clean = cleanPrompt(p); const cur = answers[currentIndex] || "";
    const lines = cur.split("\n").filter(l => l.trim()); const idx = lines.findIndex(l => l.trim() === clean);
    if (idx >= 0) { lines.splice(idx, 1); setAnswers(prev => ({...prev, [currentIndex]: lines.join("\n")})); }
    else { setAnswers(prev => ({...prev, [currentIndex]: lines.length ? lines.join("\n") + "\n" + clean : clean})); }
    if (textareaRef.current) textareaRef.current.focus();
  };
  const clearAnswer = () => { setAnswers(prev => { const next = {...prev}; delete next[currentIndex]; return next; }); };

  const doSubmit = () => {
    if (!SHEET_SCRIPT_URL || submittingRef.current) return;
    submittingRef.current = true; setSubmitStatus("submitting");
    try {
      const payload = JSON.stringify({timestamp:new Date().toLocaleString("zh-TW"),answers:questions.map((q,i)=>answers[i]||"（未填寫）")});
      let iframe = document.getElementById("sheet-submit-frame");
      if (!iframe) { iframe = document.createElement("iframe"); iframe.id="sheet-submit-frame"; iframe.name="sheet-submit"; iframe.style.display="none"; document.body.appendChild(iframe); }
      const form = document.createElement("form"); form.method="POST"; form.action=SHEET_SCRIPT_URL; form.target="sheet-submit";
      const input = document.createElement("input"); input.type="hidden"; input.name="data"; input.value=payload;
      form.appendChild(input); document.body.appendChild(form); form.submit(); document.body.removeChild(form);
      setTimeout(() => { setSubmitStatus("success"); submittingRef.current = false; setShowConfetti(true); setTimeout(() => setShowConfetti(false), 4000); }, 2500);
    } catch(err) { setSubmitStatus("error"); submittingRef.current = false; }
  };

  const swipeHandlers = useSwipe(goNext, goPrev);

  /* ═══ Splash ═══ */
  if (splash) {
    return (
      <div style={{minHeight:"100vh",minHeight:"100dvh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column"}}>

      <div style={{minHeight:"100vh",minHeight:"100dvh",display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
        <div className="glass anim-fade" style={{maxWidth:460,width:"100%",padding:32,textAlign:"center"}}>
          <div className="anim-glow" style={{width:56,height:56,borderRadius:16,background:"linear-gradient(135deg,#6366F1,#8B5CF6)",display:"inline-flex",alignItems:"center",justifyContent:"center",marginBottom:24,boxShadow:"0 0 40px rgba(99,102,241,0.3)"}}><VideoIcon/></div>

          <div style={{background:"rgba(255,255,255,0.04)",borderRadius:14,padding:18,marginBottom:14,textAlign:"left",border:"1px solid rgba(255,255,255,0.06)"}}>
            <p style={{fontSize:13,fontWeight:600,color:"rgba(255,255,255,0.7)",marginBottom:10}}>已掌握的資訊</p>
            <div style={{fontSize:13,color:"rgba(255,255,255,0.5)",lineHeight:2.0}}>
              {sectionData.map(sd => (
                <div key={sd.sec} style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{...S.badge(sd.sc),width:20,height:20,fontSize:10,borderRadius:6}}>{sd.sc.badge}</span>

                </div>

            </div>
          </div>

          <div style={{background:"rgba(129,140,248,0.06)",borderRadius:14,padding:16,marginBottom:28,textAlign:"left",border:"1px solid rgba(129,140,248,0.1)"}}>
            <p style={{fontSize:13,fontWeight:600,color:"#818CF8",marginBottom:8}}>填寫方式</p>
            <div style={{fontSize:12,color:"rgba(129,140,248,0.7)",lineHeight:2.1}}>
              <div>· 支援語音輸入，直接對手機說就好</div>
              <div>· 每題有快速選項，可多選、再點取消</div>
              <div>· 標「已知」的題目只需確認是否正確</div>
              <div>· 不確定的可以跳過，左右滑動切換題目</div>
              <div>· 填到一半關掉也不會消失，自動保存</div>

            <div style={{display:"flex",gap:10}}>
              <button onClick={() => setCurrentIndex(0)} style={{...S.btnSecondary,flex:1,fontSize:14}}>從頭開始</button>

        </div>
      </div>
    );

  if (showOverview || isComplete) {
    let sec = "";

      if (overviewFilter === "all") return true;
      if (overviewFilter === "answered") return answers[i] && answers[i].trim();

              {!isComplete && <button onClick={() => {setShowOverview(false);setIsComplete(false);}} style={{...S.btnText,fontSize:13,padding:"4px 8px",display:"flex",alignItems:"center",gap:2}}><CloseIcon/></button>}
            </div>
            <p style={{color:"rgba(255,255,255,0.35)",fontSize:13,marginBottom:14}}>已填 {answeredCount} / {total} 題 {answeredCount === total && " — 全部完成！"}</p>
            <div style={{width:"100%",background:"rgba(255,255,255,0.06)",borderRadius:999,height:6,marginBottom:16}}>
              <div style={{background:answeredCount===total?"#10B981":"linear-gradient(90deg,#6366F1,#A855F7)",height:6,borderRadius:999,transition:"width 0.5s",width:(answeredCount/total*100)+"%",boxShadow:answeredCount===total?"0 0 12px rgba(16,185,129,0.4)":"0 0 12px rgba(99,102,241,0.3)"}}/>

            <button onClick={doSubmit} disabled={submitStatus==="submitting"||submitStatus==="success"} style={{...S.btnPrimary,width:"100%",display:"flex",alignItems:"center",justifyContent:"center",gap:8,opacity:submitStatus==="submitting"?0.6:1,background:submitStatus==="success"?"linear-gradient(135deg,#059669,#10B981)":submitStatus==="error"?"linear-gradient(135deg,#DC2626,#EF4444)":"linear-gradient(135deg,#6366F1,#8B5CF6)"}}>
              <SendIcon/>
              {submitStatus==="idle"&&"送出回覆"}{submitStatus==="submitting"&&"送出中⋯"}{submitStatus==="success"&&"已成功送出"}{submitStatus==="error"&&"送出失敗，點此重試"}
            </button>
            {submitStatus==="success"&&<p style={{textAlign:"center",color:"#10B981",fontSize:12,marginTop:10,fontWeight:500}}>回覆已成功送出！</p>}
          </div>

          {filteredQs.map((q) => {
            const i = questions.indexOf(q);
            const isNew = q.section !== sec; if (isNew) sec = q.section;
            const c = SC[q.section]; const has = answers[i] && answers[i].trim();
            return (<div key={q.id}>
              {isNew && <div style={{display:"flex",alignItems:"center",gap:8,marginTop:22,marginBottom:10,padding:"0 4px"}}><span style={S.badge(c)}>{c.badge}</span><span style={{fontWeight:600,color:"rgba(255,255,255,0.6)",fontSize:13}}>{q.section}</span></div>}
              <button onClick={() => jumpTo(i)} style={{width:"100%",textAlign:"left",borderRadius:14,padding:14,marginBottom:6,border:has?`1px solid ${c.confirmBorder}`:"1px solid rgba(255,255,255,0.04)",cursor:"pointer",background:has?"rgba(255,255,255,0.06)":"rgba(255,255,255,0.02)",backdropFilter:"blur(12px)",WebkitBackdropFilter:"blur(12px)"}}>
                <div style={{display:"flex",alignItems:"flex-start",gap:10}}>
                  <span style={{flexShrink:0,width:26,height:26,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,background:has?c.light:"rgba(255,255,255,0.04)",color:has?c.dark:"rgba(255,255,255,0.25)"}}>{has?<CheckIcon size={14} color={c.accent}/>:q.id}</span>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3,flexWrap:"wrap"}}>
                      <span style={{fontSize:13,fontWeight:500,color:"rgba(255,255,255,0.8)"}}>{q.title}</span>
                      {q.type==="confirm"&&<span style={S.pillBadge}>已知待確認</span>}
                    </div>
                    {has?<p style={{fontSize:12,color:"rgba(255,255,255,0.4)",margin:0,lineHeight:1.6,display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical",overflow:"hidden"}}>{answers[i]}</p>:<p style={{fontSize:12,color:"rgba(255,255,255,0.15)",fontStyle:"italic",margin:0}}>尚未填寫</p>}
                  </div>
                </div>
              </button>
            </div>);
          })}
          {filteredQs.length === 0 && <p style={{textAlign:"center",color:"rgba(255,255,255,0.25)",fontSize:13,padding:40}}>{overviewFilter==="unanswered"?"全部都填完了！":"還沒有填寫任何題目"}</p>}
          <div style={{display:"flex",gap:10,marginTop:22,marginBottom:32}}>
            <button onClick={() => {setShowOverview(false);setIsComplete(false);setCurrentIndex(0);}} style={{...S.btnSecondary,flex:1}}>回到第一題</button>
            <button onClick={doSubmit} disabled={submitStatus==="submitting"||submitStatus==="success"} style={{...S.btnPrimary,flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}><SendIcon/> {submitStatus==="success"?"已送出":"送出回覆"}</button>
          </div>
        </div>
      </div>
    );
  }

  /* ═══ Question ═══ */
  const curAnswer = answers[currentIndex] || "";
  const isFirst = currentIndex === 0;
  const isLast = currentIndex === total - 1;

  return (
    <div style={{minHeight:"100vh",minHeight:"100dvh",display:"flex",flexDirection:"column"}} {...swipeHandlers}>
      <div className="glass-bar" style={{padding:"8px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:50}}>
        {!isWide && <button onClick={() => setShowSidebar(true)} style={{...S.btnText,fontSize:13,padding:"6px 8px",display:"flex",alignItems:"center",gap:4}}><MenuIcon/></button>}
        {isWide && <button onClick={() => setShowOverview(true)} style={{...S.btnText,fontSize:13,padding:"6px 10px",display:"flex",alignItems:"center",gap:2}}><ChevronLeft/> 總覽</button>}
        <div style={{flex:1,margin:"0 8px"}}><Timeline currentIndex={currentIndex} answers={answers} isWide={isWide}/></div>
        {isWide && <span style={{fontSize:12,color:"rgba(255,255,255,0.3)",fontWeight:500,fontVariantNumeric:"tabular-nums",flexShrink:0}}>{currentIndex+1}/{total}</span>}
      </div>

      <div style={{flex:1,display:"flex",overflow:"hidden"}}>
        {isWide && <Sidebar currentIndex={currentIndex} answers={answers} onJumpTo={jumpTo} isWide={true} showMobile={false} onClose={()=>{}} onOverview={()=>setShowOverview(true)} answeredCount={answeredCount} total={total}/>}
        <Sidebar currentIndex={currentIndex} answers={answers} onJumpTo={jumpTo} isWide={false} showMobile={showSidebar} onClose={() => setShowSidebar(false)} onOverview={()=>setShowOverview(true)} answeredCount={answeredCount} total={total}/>

        <div ref={contentRef} style={{flex:1,overflowY:"auto",padding:"24px 16px 120px"}} className={slideDir==="left"?"anim-left":"anim-right"} key={currentIndex}>
          <div style={{maxWidth:520,width:"100%",margin:"0 auto"}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}>
              <span style={{display:"inline-flex",alignItems:"center",padding:"5px 14px",borderRadius:999,background:sc.light,color:sc.dark,fontSize:13,fontWeight:600}}>第 {currentQuestion.id} 題</span>
              {currentQuestion.type==="confirm"&&<span style={S.pillBadge}>已知待確認</span>}
            </div>

            <h2 style={{fontSize:18,fontWeight:700,color:"#fff",marginBottom:12,lineHeight:1.65}}>{currentQuestion.title}</h2>

            {currentQuestion.prefilled && (
              <div style={{padding:16,marginBottom:14,borderRadius:14,background:sc.confirmBg,border:`1px solid ${sc.confirmBorder}`}}>
                <p style={{fontSize:11,color:"rgba(255,255,255,0.35)",marginBottom:4,fontWeight:500}}>目前掌握的資訊</p>
                <p style={{fontSize:14,color:"rgba(255,255,255,0.75)",lineHeight:1.7,margin:0}}>{currentQuestion.prefilled}</p>
              </div>
            )}

            <p style={{color:"rgba(255,255,255,0.3)",fontSize:13,marginBottom:16}}>{currentQuestion.hint}</p>

            {currentQuestion.prompts && currentQuestion.prompts.length > 0 && (
              <div style={{marginBottom:16}}>
                <button onClick={() => setExpandedPrompts(!expandedPrompts)} style={{display:"flex",alignItems:"center",gap:5,fontSize:12,color:"rgba(255,255,255,0.3)",background:"none",border:"none",cursor:"pointer",marginBottom:8,padding:0,fontWeight:500}}>
                  <span>快速選擇（可多選）</span>
                  <span style={{fontSize:9,transition:"transform 0.2s",transform:expandedPrompts?"rotate(180deg)":"rotate(0)"}}>&#9650;</span>
                </button>
                {expandedPrompts && (
                  <div style={{display:"flex",flexDirection:"column",gap:6}}>
                    {currentQuestion.prompts.map((p,pi) => {
                      const selected = isPromptSelected(p);
                      return (
                        <button key={pi} onClick={() => handlePromptClick(p)} className="anim-fade" style={{display:"flex",alignItems:"center",gap:10,width:"100%",textAlign:"left",fontSize:14,padding:"11px 14px",borderRadius:12,border:selected?`1.5px solid ${sc.accent}`:`1px solid ${sc.promptBorder}`,background:selected?sc.light:sc.promptBg,backdropFilter:"blur(8px)",WebkitBackdropFilter:"blur(8px)",color:selected?(sc.dark||"#fff"):"rgba(255,255,255,0.6)",cursor:"pointer",lineHeight:1.5,fontWeight:selected?500:400,animationDelay:(pi*0.05)+"s",boxShadow:selected?`0 0 16px ${sc.glow}`:""}}>
                          <span style={{flexShrink:0,width:20,height:20,borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center",background:selected?sc.accent:"rgba(255,255,255,0.06)",transition:"all 0.2s"}}>
                            {selected && <AnimCheck/>}
                          </span>
                          {p}
                        </button>
                      );
                    })}
                  </div>
                )}
              </div>
            )}

            <div style={{position:"relative"}}>
              <textarea ref={textareaRef} value={curAnswer} onChange={e => setAnswers(prev => ({...prev,[currentIndex]:e.target.value}))} placeholder={currentQuestion.type==="confirm"?"請確認或說明需調整之處⋯":"請輸入您的回覆⋯"} style={{...S.textarea,"::placeholder":{color:"rgba(255,255,255,0.2)"}}} rows={3}/>
              {curAnswer.trim() && (
                <button onClick={clearAnswer} title="清除此題回答" style={{position:"absolute",top:10,right:10,background:"rgba(255,255,255,0.06)",border:"none",borderRadius:6,padding:6,cursor:"pointer",color:"rgba(255,255,255,0.25)",display:"flex"}}>
                  <TrashIcon/>
                </button>
              )}
            </div>
          </div>
        </div>
      </div>

      <div className="glass-bar" style={{borderTop:"1px solid rgba(255,255,255,0.04)",padding:"10px 16px",position:"sticky",bottom:0,zIndex:50}}>
        <div className="safe-bottom" style={{maxWidth:520,margin:"0 auto",display:"flex",alignItems:"center",gap:6}}>
          <button onClick={goPrev} disabled={isFirst} style={{...S.btnText,display:"flex",alignItems:"center",gap:2,opacity:isFirst?0.2:1}}><ChevronLeft/> {isFirst?"歡迎頁":"上一題"}</button>
          <button onClick={goNext} style={{...S.btnText,fontSize:12,color:"rgba(255,255,255,0.15)"}}>跳過</button>
          <div style={{flex:1}}/>
          <button onClick={goNext} style={{...S.btnPrimary,display:"flex",alignItems:"center",gap:4,minWidth:isLast?100:undefined,justifyContent:"center",padding:"12px 24px"}}>
            {isLast?(<><CheckIcon size={16} color="#fff"/> 完成</>):(<>下一題 <ChevronRight/></>)}
          </button>
        </div>
      </div>

      <Toast key={toastKey} message={toastMsg} visible={!!toastMsg}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
