/* ═══ Questions ═══ */
const questions = [
  {id:1,section:"影片 A：開場影片（約 2 分鐘）",type:"confirm",title:"開場影片的方向，我們目前理解是這樣：",prefilled:"約 2 分鐘，歡樂氛圍，目的是吸引眼球、帶動全場氣氛",hint:"如果有要修正或補充，直接說就好",prompts:["對，就是這個方向","大方向對，但要補充⋯","不太對，我想要的是⋯"]},
  {id:2,section:"影片 A：開場影片（約 2 分鐘）",type:"confirm",title:"入鏡人物的部分，我們知道有環境部部長，還有另一位長官？",prefilled:"環境部部長（確定入鏡）＋ 另一位長官（待確認是誰）",hint:"請告訴我們另一位長官是誰",prompts:["另一位是 ___（請說出名字或職稱）","目前還不確定，之後再補","不只兩位，其實還有⋯"]},
  {id:3,section:"影片 A：開場影片（約 2 分鐘）",type:"open",title:"部長和另一位長官在開場影片裡，大概是什麼角色？",prefilled:"",hint:"他們是致詞、表演、還是只是出現在畫面中",prompts:["主角 — 他們有台詞或動作表演","畫面出現就好，不需要說話","帶頭做一個動作或手勢，營造氣氛","其中一位主講，另一位陪襯"]},
  {id:4,section:"影片 A：開場影片（約 2 分鐘）",type:"confirm",title:"後面有「舞伴」的構想？可能是真人也可能是玩偶人物？",prefilled:"有舞伴的概念，可能是真人或玩偶角色（可能代表 LINE 等服務管道？）",hint:"這個想法的細節是什麼",prompts:["對，是用玩偶代表不同服務管道（LINE、電話等）","是真人扮裝，不是玩偶","是 LINE 的官方貼圖角色或吉祥物","是環境部自己的吉祥物或代言角色","我記錯了，實際是⋯"]},
  {id:5,section:"影片 A：開場影片（約 2 分鐘）",type:"open",title:"「舞伴」在影片中的作用是什麼？",prefilled:"",hint:"他們出來是要跳舞、互動、還是做什麼",prompts:["搭配音樂跳舞，純粹帶氣氛","跟部長互動，製造歡樂效果","代表不同服務管道，每個角色出場介紹自己","背景裝飾，增加畫面豐富度"]},
  {id:6,section:"影片 A：開場影片（約 2 分鐘）",type:"open",title:"開場影片的「歡樂感」你心中的畫面是什麼？",prefilled:"",hint:"幫我們抓到你想要的歡樂溫度",prompts:["綜藝節目式的誇張歡樂 — 高能量","輕快活潑但不誇張 — 像企業形象片的愉快版","溫馨有趣 — 像公益廣告那種讓人微笑的感覺","有一個小橋段或小劇情讓大家笑出來"]},
  {id:7,section:"影片 A：開場影片（約 2 分鐘）",type:"open",title:"開場影片需不需要帶出 1999 或服務整合的內容？",prefilled:"",hint:"開場是純帶氣氛，還是也要預告主題",prompts:["純帶氣氛就好，1999 留給第二支影片","可以在最後帶一下預告，讓觀眾好奇","開場就要點出主題，讓大家知道今天要講什麼"]},
  {id:8,section:"影片 A：開場影片（約 2 分鐘）",type:"open",title:"開場影片播完後，觀眾理想的反應是？",prefilled:"",hint:"播完那一刻，你希望看到什麼場景",prompts:["大家鼓掌笑著，氣氛很好","觀眾很期待接下來的報告內容","現場有種「哇，環境部不一樣了」的感覺","觀眾開始拿手機拍照或錄影分享"]},
  {id:9,section:"影片 B：1999 整合介紹",type:"confirm",title:"影片 B 的核心訊息，我們理解是：",prefilled:"以前民眾要打很多不同號碼處理不同問題，現在整合成 1999 一支電話就能處理",hint:"這樣理解對嗎？有沒有要修正",prompts:["對，核心就是「多線合一」","對，但要強調「不只是電話整合，是服務升級」","方向對，但還要加上⋯"]},
  {id:10,section:"影片 B：1999 整合介紹",type:"open",title:"具體有哪些服務被整合進 1999 了？",prefilled:"",hint:"盡量列出你記得的，之後可以再補",prompts:["資源回收相關","垃圾車班表 / 清運服務","環境陳情 / 通報（噪音、空汙等）","其他民生環境服務（請語音說明）"]},
  {id:11,section:"影片 B：1999 整合介紹",type:"confirm",title:"副總提到除了 1999 電話，也要介紹 LINE 等其他管道？",prefilled:"影片後半段要帶出：除了 1999 專線，還有 LINE 及其他數位管道可以使用",hint:"有哪些管道要被提到",prompts:["1999 電話 ＋ LINE 官方帳號","還有 APP 或網站","還有 Facebook / 社群媒體","我不確定全部有哪些，請副總列出"]},
  {id:12,section:"影片 B：1999 整合介紹",type:"confirm",title:"副總想要用「一鏡到底」的方式來呈現影片 B？",prefilled:"影片 B 用一鏡到底的手法，從頭到尾不剪接、一氣呵成地介紹",hint:"確認一下這個想法",prompts:["對，就是要一鏡到底的感覺","不一定要真的一鏡到底，但要有那種流暢連貫感","我記錯了，不是一鏡到底，是⋯"]},
  {id:13,section:"影片 B：1999 整合介紹",type:"open",title:"一鏡到底的畫面，你心中的場景是怎樣走的？",prefilled:"",hint:"想像鏡頭從哪裡開始、經過哪裡、在哪裡結束",prompts:["從民眾遇到問題開始 → 撥打 1999 → 問題被處理","從辦公室接線場景 → 走到戶外各種服務現場","從以前（分散打電話）→ 過渡到現在（一通搞定）","從 1999 電話 → 延伸到 LINE → 到其他管道","我沒有具體想法，交給製作團隊發想"]},
  {id:14,section:"影片 B：1999 整合介紹",type:"open",title:"影片 B 大概多長？",prefilled:"",hint:"有沒有時間限制",prompts:["2 分鐘以內","3 分鐘左右","5 分鐘以內都可以","沒有特別限制，看內容需要"]},
  {id:15,section:"影片 B：1999 整合介紹",type:"open",title:"影片 B 的整體風格要什麼感覺？",prefilled:"",hint:"跟開場影片是同風格還是不同",prompts:["跟開場一樣歡樂活潑","比開場稍微正式一點，但不要太嚴肅","專業清晰，像一支好的說明影片","溫暖感人路線，讓人覺得政府在進步"]},
  {id:16,section:"影片 B：1999 整合介紹",type:"open",title:"影片 B 需要哪些人入鏡？",prefilled:"",hint:"跟開場影片一樣的人，還是不同陣容",prompts:["跟開場一樣 — 部長 ＋ 另一位長官","不需要長官，用旁白或字幕就好","需要接線人員或服務人員入鏡","需要民眾 / 市民的使用畫面","用動畫或圖表呈現，不需要真人"]},
  {id:17,section:"影片 B：1999 整合介紹",type:"open",title:"影片 B 結尾要怎麼收？",prefilled:"",hint:"最後一個畫面或最後一句話",prompts:["大大的 1999 號碼 ＋ LINE QR Code","一句 slogan，像是「一通電話，搞定所有環境大小事」","回到部長畫面做最後呼籲","所有管道（電話、LINE、APP）一起出現在畫面上"]},
  {id:18,section:"整體 & 補充",type:"open",title:"有沒有你看過的影片是你喜歡的風格？",prefilled:"",hint:"給我們一個參考方向，比講一百句形容詞都有用",prompts:["有，我之後傳連結給你們","某個政府宣傳片我很喜歡（請語音描述）","某個品牌廣告的感覺很接近（請語音描述）","沒有特別的參考"]},
  {id:19,section:"整體 & 補充",type:"open",title:"有沒有絕對不能出現的東西？",prefilled:"",hint:"風格、畫面、用詞的地雷區",prompts:["不要太像選舉宣傳片","不要出現特定政治人物或標語","不要太兒戲，畢竟是政府活動","目前沒有特別的禁忌"]},
  {id:20,section:"整體 & 補充",type:"open",title:"兩支影片的播放場合是什麼？",prefilled:"",hint:"在什麼場地、什麼時機播放",prompts:["活動現場大螢幕","也會放到網路上（YouTube、社群等）","只在活動現場播，不對外公開","活動後也會用於其他場合（記者會、內部報告等）"]},
  {id:21,section:"整體 & 補充",type:"open",title:"觀眾是誰？",prefilled:"",hint:"現場坐的是哪些人",prompts:["環境部內部同仁","各縣市環保局代表","民意代表 / 議員","媒體記者","一般民眾 / 里長 / 社區代表","以上好幾種混合（請說明）"]},
  {id:22,section:"整體 & 補充",type:"open",title:"活動日期和拍攝時程大概是什麼時候？",prefilled:"",hint:"讓我們知道有多少時間可以製作",prompts:["活動在 ___ 月（請語音說出）","拍攝希望在 ___ 前完成","時間很趕，需要盡快啟動","時間充裕，慢慢來沒關係"]},
  {id:23,section:"整體 & 補充",type:"open",title:"預算範圍大概在哪裡？",prefilled:"",hint:"方便我們規劃製作規模",prompts:["有明確預算（請語音說出金額區間）","預算待確認，但希望控制在合理範圍","這題之後再談"]},
  {id:24,section:"整體 & 補充",type:"open",title:"還有什麼是你一定要提醒我們的？",prefilled:"",hint:"任何想到的都可以說，最後自由補充",prompts:["某位長官有特殊需求或偏好","場地有特殊限制","有其他單位也要配合","上次開會有提到但我忘記了，之後再補","目前沒有其他要補充的"]},
];

const SC = {
  "影片 A：開場影片（約 2 分鐘）":{badge:"A",accent:"#D97706",light:"#FEF3C7",dark:"#92400E",progress:"#F59E0B",promptBg:"rgba(254,243,199,0.45)",promptBorder:"rgba(217,119,6,0.18)",confirmBg:"rgba(254,243,199,0.35)",confirmBorder:"rgba(217,119,6,0.30)"},
  "影片 B：1999 整合介紹":{badge:"B",accent:"#059669",light:"#D1FAE5",dark:"#065F46",progress:"#10B981",promptBg:"rgba(209,250,229,0.45)",promptBorder:"rgba(5,150,105,0.18)",confirmBg:"rgba(209,250,229,0.35)",confirmBorder:"rgba(5,150,105,0.30)"},
  "整體 & 補充":{badge:"+",accent:"#7C3AED",light:"#EDE9FE",dark:"#5B21B6",progress:"#A855F7",promptBg:"rgba(237,233,254,0.45)",promptBorder:"rgba(124,58,237,0.18)",confirmBg:"rgba(237,233,254,0.35)",confirmBorder:"rgba(124,58,237,0.30)"},

  pillBadge:{display:"inline-flex",alignItems:"center",padding:"3px 10px",borderRadius:999,background:"rgba(59,130,246,0.08)",color:"#2563EB",fontSize:11,fontWeight:600,letterSpacing:"0.02em"},

  btnSecondary:{padding:"13px 28px",background:"rgba(255,255,255,0.55)",backdropFilter:"blur(8px)",WebkitBackdropFilter:"blur(8px)",border:"0.5px solid rgba(0,0,0,0.06)",color:"#475569",borderRadius:12,fontSize:14,fontWeight:500,cursor:"pointer",transition:"all 0.2s"},

function App() {
  const [currentIndex, setCurrentIndex] = useState(-1);
  const [answers, setAnswers] = useState({});
  const [isComplete, setIsComplete] = useState(false);
  const [showOverview, setShowOverview] = useState(false);
  const [expandedPrompts, setExpandedPrompts] = useState(true);
  const [submitStatus, setSubmitStatus] = useState("idle");
  const textareaRef = useRef(null);

  useEffect(() => {
    if (textareaRef.current && currentIndex >= 0)
      setTimeout(() => { if(textareaRef.current) textareaRef.current.focus(); }, 150);
  }, [currentIndex]);

  useEffect(() => {
    try { const s = localStorage.getItem("env_video_answers"); if (s) setAnswers(JSON.parse(s)); } catch(e) {}
  }, []);
  useEffect(() => {
    try { localStorage.setItem("env_video_answers", JSON.stringify(answers)); } catch(e) {}
  }, [answers]);

  const total = questions.length;
  const answeredCount = Object.keys(answers).filter(k => answers[k] && answers[k].trim()).length;
  const currentQuestion = currentIndex >= 0 ? questions[currentIndex] : null;
  const sc = currentQuestion ? SC[currentQuestion.section] : null;

  const goNext = () => { if (currentIndex < total - 1) { setCurrentIndex(currentIndex + 1); setExpandedPrompts(true); } else { setIsComplete(true); } };
  const goPrev = () => { if (currentIndex > 0) { setCurrentIndex(currentIndex - 1); setExpandedPrompts(true); } else if (currentIndex === 0) { setCurrentIndex(-1); } };
  const jumpTo = (i) => { setCurrentIndex(i); setShowOverview(false); setIsComplete(false); setExpandedPrompts(true); };

  const handlePromptClick = (p) => {
    const cur = answers[currentIndex] || "";
    const clean = p.replace(/[？？]$/, "");
    const val = cur ? cur + "\n" + clean : clean;
    setAnswers(prev => ({...prev, [currentIndex]: val}));
    if (textareaRef.current) textareaRef.current.focus();
  };

  const doSubmit = () => {
    if (!SHEET_SCRIPT_URL) return;
    setSubmitStatus("submitting");
    const payload = JSON.stringify({
      timestamp: new Date().toLocaleString("zh-TW"),
      answers: questions.map((q, i) => answers[i] || "（未填寫）"),
    });
    const iframe = document.createElement("iframe");
    iframe.name = "sheet-submit";
    iframe.style.display = "none";
    document.body.appendChild(iframe);
    const form = document.createElement("form");
    form.method = "POST";
    form.action = SHEET_SCRIPT_URL;
    form.target = "sheet-submit";
    const input = document.createElement("input");
    input.type = "hidden";
    input.name = "data";
    input.value = payload;
    form.appendChild(input);
    document.body.appendChild(form);
    form.submit();
    document.body.removeChild(form);
    setTimeout(() => {
      setSubmitStatus("success");
      try { document.body.removeChild(iframe); } catch(e) {}
    }, 2000);
  };

  const doExport = () => {
    let t = "環境部兩支影片需求問卷 — 副總回覆紀錄\n";
    t += "填寫日期：" + new Date().toLocaleDateString("zh-TW") + "\n";
    t += "=".repeat(50) + "\n\n";
    let sec = "";
    questions.forEach((q, i) => {
      if (q.section !== sec) { sec = q.section; t += "\n" + "─".repeat(40) + "\n" + sec + "\n" + "─".repeat(40) + "\n\n"; }
      const a = answers[i] ? answers[i].trim() : "";
      t += "【第 " + q.id + " 題】" + q.title + "\n";
      if (q.prefilled) t += "（已知資訊）" + q.prefilled + "\n";
      t += "副總回覆：" + (a || "（未填寫）") + "\n\n";
    });
    t += "=".repeat(50) + "\n共 " + total + " 題，已填 " + answeredCount + " 題\n";
    const blob = new Blob([t], {type:"text/plain;charset=utf-8"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "環境部影片需求_副總回覆_" + new Date().toISOString().slice(0,10) + ".txt";
    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  };

  /* ════════════════════════════════════════ */
  /* ═══ Welcome ═══ */
  /* ════════════════════════════════════════ */
  if (currentIndex === -1 && !isComplete && !showOverview) {
    return (
      <div style={S.center}>
        <div className="glass animate-in" style={{maxWidth:460,width:"100%",...S.card,textAlign:"center"}}>
          <div style={{width:52,height:52,borderRadius:14,background:"linear-gradient(135deg,#0F172A,#334155)",display:"inline-flex",alignItems:"center",justifyContent:"center",marginBottom:20}}>
            <VideoIcon/>
          </div>
          <h1 style={{fontSize:21,fontWeight:700,color:"#0F172A",marginBottom:6,letterSpacing:"-0.01em"}}>環境部影片需求確認</h1>
          <p style={{color:"#94A3B8",fontSize:14,marginBottom:4}}>兩支影片 · 共 {total} 題</p>
          <p style={{color:"#CBD5E1",fontSize:12,marginBottom:24}}>VV 團隊已整理目前掌握的資訊，請您確認與補充</p>

          <div style={{background:"rgba(255,255,255,0.5)",borderRadius:12,padding:18,marginBottom:14,textAlign:"left",border:"0.5px solid rgba(0,0,0,0.04)"}}>
            <p style={{fontSize:13,fontWeight:600,color:"#334155",marginBottom:10}}>已掌握的資訊</p>
            <div style={{fontSize:13,color:"#475569",lineHeight:2.0}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{...S.badge(SC["影片 A：開場影片（約 2 分鐘）"]),width:20,height:20,fontSize:10,borderRadius:6}}>A</span> 開場約 2 分鐘，歡樂氛圍，部長入鏡</div>
              <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{...S.badge(SC["影片 B：1999 整合介紹"]),width:20,height:20,fontSize:10,borderRadius:6}}>B</span> 1999 服務整合介紹，一鏡到底風格</div>
              <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{...S.badge(SC["整體 & 補充"]),width:20,height:20,fontSize:10,borderRadius:6}}>+</span> 不只 1999，也要帶到 LINE 及其他管道</div>
            </div>
          </div>

          <div style={{background:"rgba(59,130,246,0.04)",borderRadius:12,padding:16,marginBottom:24,textAlign:"left",border:"0.5px solid rgba(59,130,246,0.08)"}}>
            <p style={{fontSize:13,fontWeight:600,color:"#1D4ED8",marginBottom:8}}>填寫方式</p>
            <div style={{fontSize:12,color:"#3B82F6",lineHeight:2.1}}>
              <div>· 支援語音輸入，直接對手機說就好</div>
              <div>· 每題有快速選項，點選即可填入</div>
              <div>· 標「已知」的題目只需確認是否正確</div>
              <div>· 不確定的可以跳過，隨時回頭修改</div>
              <div>· 填到一半關掉也不會消失，自動保存</div>
            </div>
          </div>

          <button onClick={() => setCurrentIndex(0)} style={{...S.btnPrimary,width:"100%",padding:"15px 28px",fontSize:16}}>
            開始填寫
          </button>
        </div>
      </div>
    );
  }

  /* ════════════════════════════════════════ */
  /* ═══ Overview / Complete ═══ */
  /* ════════════════════════════════════════ */
  if (showOverview || isComplete) {
    let sec = "";
    return (
      <div style={{minHeight:"100vh",padding:16}}>
        <div style={{maxWidth:600,margin:"0 auto"}}>
          <div className="glass animate-in" style={{padding:24,marginBottom:16}}>
            <h2 style={{fontSize:19,fontWeight:700,color:"#0F172A",marginBottom:4}}>
              {isComplete ? "確認完成！感謝副總" : "問卷總覽"}
            </h2>
            <p style={{color:"#94A3B8",fontSize:13,marginBottom:14}}>已填 {answeredCount} / {total} 題</p>
            <div style={{width:"100%",background:"rgba(0,0,0,0.04)",borderRadius:999,height:6,marginBottom:20}}>
              <div style={{background:"#0F172A",height:6,borderRadius:999,transition:"width 0.5s",width:(answeredCount/total*100)+"%"}}/>
            </div>

            <button onClick={doSubmit} disabled={submitStatus==="submitting"||submitStatus==="success"} style={{...S.btnPrimary,width:"100%",display:"flex",alignItems:"center",justifyContent:"center",gap:8,opacity:submitStatus==="submitting"?0.6:1,background:submitStatus==="success"?"#059669":"#0F172A"}}>
              <SendIcon/>
              {submitStatus==="idle" && "送出回覆"}
              {submitStatus==="submitting" && "送出中⋯"}
              {submitStatus==="success" && "已成功送出"}
              {submitStatus==="error" && "送出失敗，點此重試"}
            </button>
            {submitStatus==="success" && <p style={{textAlign:"center",color:"#059669",fontSize:12,marginTop:10,fontWeight:500}}>回覆已送達，感謝副總！</p>}
          </div>

          {questions.map((q, i) => {
            const isNew = q.section !== sec;
            if (isNew) sec = q.section;
            const c = SC[q.section];
            const has = answers[i] && answers[i].trim();
            return (
              <div key={q.id}>
                {isNew && (
                  <div style={{display:"flex",alignItems:"center",gap:8,marginTop:22,marginBottom:10,padding:"0 4px"}}>
                    <span style={S.badge(c)}>{c.badge}</span>
                    <span style={{fontWeight:600,color:"#334155",fontSize:13}}>{q.section}</span>
                  </div>
                )}
                <button onClick={() => jumpTo(i)} style={{width:"100%",textAlign:"left",borderRadius:12,padding:14,marginBottom:6,border:has?"1.5px solid "+c.confirmBorder:"0.5px solid rgba(0,0,0,0.04)",cursor:"pointer",transition:"all 0.2s",background:has?"rgba(255,255,255,0.75)":"rgba(255,255,255,0.55)",backdropFilter:"blur(12px)",WebkitBackdropFilter:"blur(12px)"}}>
                  <div style={{display:"flex",alignItems:"flex-start",gap:10}}>
                    <span style={{flexShrink:0,width:26,height:26,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,background:has?c.light:"rgba(0,0,0,0.03)",color:has?c.dark:"#94A3B8"}}>{q.id}</span>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3,flexWrap:"wrap"}}>
                        <span style={{fontSize:13,fontWeight:500,color:"#334155"}}>{q.title}</span>
                        {q.type==="confirm" && <span style={S.pillBadge}>已知待確認</span>}
                      </div>
                      {has ? <p style={{fontSize:12,color:"#64748B",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",margin:0}}>{answers[i]}</p>
                           : <p style={{fontSize:12,color:"#CBD5E1",fontStyle:"italic",margin:0}}>尚未填寫</p>}
                    </div>
                  </div>
                </button>
              </div>
            );
          })}

          <div style={{display:"flex",gap:10,marginTop:22,marginBottom:32}}>
            <button onClick={() => {setShowOverview(false);setIsComplete(false);setCurrentIndex(0);}} style={{...S.btnSecondary,flex:1}}>回到第一題</button>
            <button onClick={doSubmit} disabled={submitStatus==="submitting"||submitStatus==="success"} style={{...S.btnPrimary,flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:6,background:submitStatus==="success"?"#059669":"#0F172A"}}>
              <SendIcon/> {submitStatus==="success"?"已送出":"送出回覆"}
            </button>
          </div>
        </div>
      </div>
    );
  }

  /* ════════════════════════════════════════ */
  /* ═══ Question ═══ */
  /* ════════════════════════════════════════ */
  return (
    <div style={S.page}>
      {/* Top bar */}
      <div className="glass-bar" style={{padding:"10px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:"0.5px solid rgba(0,0,0,0.04)"}}>
        <button onClick={() => setShowOverview(true)} style={{...S.btnText,fontSize:13,padding:"6px 10px",display:"flex",alignItems:"center",gap:2}}>
          <ChevronLeft/> 總覽
        </button>
        <span style={{fontSize:13,color:"#94A3B8",fontWeight:500,fontVariantNumeric:"tabular-nums"}}>{currentIndex+1} / {total}</span>
        <span style={S.sectionBadge(sc)}>
          <span style={{...S.badge(sc),width:18,height:18,fontSize:9,borderRadius:5}}>{sc.badge}</span>
          {currentQuestion.section.split("：")[0]}
        </span>
      </div>

      {/* Progress bar */}
      <div style={{width:"100%",background:"rgba(0,0,0,0.03)",height:2}}>
        <div style={{background:sc.progress,height:2,transition:"width 0.5s ease-out",width:((currentIndex+1)/total*100)+"%"}}/>
      </div>

      {/* Main content */}
      <div style={{flex:1,overflowY:"auto",padding:"24px 16px"}} className="animate-in" key={currentIndex}>
        <div style={{maxWidth:480,width:"100%",margin:"0 auto"}}>
          {/* Badges */}
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}>
            <span style={{display:"inline-flex",alignItems:"center",padding:"5px 14px",borderRadius:999,background:sc.light,color:sc.dark,fontSize:13,fontWeight:600}}>
              第 {currentQuestion.id} 題
            </span>
            {currentQuestion.type==="confirm" && <span style={S.pillBadge}>已知待確認</span>}
          </div>

          {/* Title */}
          <h2 style={{fontSize:18,fontWeight:700,color:"#0F172A",marginBottom:10,lineHeight:1.65,letterSpacing:"-0.01em"}}>{currentQuestion.title}</h2>

          {/* Prefilled info */}
          {currentQuestion.prefilled && (
            <div className="glass" style={{padding:14,marginBottom:14,background:sc.confirmBg,border:"1px solid "+sc.confirmBorder,boxShadow:"none"}}>
              <p style={{fontSize:11,color:"#94A3B8",marginBottom:3,fontWeight:500}}>目前掌握的資訊</p>
              <p style={{fontSize:14,color:"#334155",lineHeight:1.7,margin:0}}>{currentQuestion.prefilled}</p>
            </div>
          )}

          {/* Hint */}
          <p style={{color:"#94A3B8",fontSize:13,marginBottom:16}}>{currentQuestion.hint}</p>

          {/* Quick select prompts */}
          {currentQuestion.prompts && currentQuestion.prompts.length > 0 && (
            <div style={{marginBottom:16}}>
              <button onClick={() => setExpandedPrompts(!expandedPrompts)} style={{display:"flex",alignItems:"center",gap:5,fontSize:12,color:"#94A3B8",background:"none",border:"none",cursor:"pointer",marginBottom:8,padding:0,fontWeight:500}}>
                <span>快速選擇</span>
                <span style={{fontSize:9,transition:"transform 0.2s",transform:expandedPrompts?"rotate(180deg)":"rotate(0)"}}>&#9650;</span>
              </button>
              {expandedPrompts && (
                <div style={{display:"flex",flexDirection:"column",gap:5}}>
                  {currentQuestion.prompts.map((p, pi) => (
                    <button key={pi} onClick={() => handlePromptClick(p)} style={{display:"block",width:"100%",textAlign:"left",fontSize:14,padding:"10px 12px",borderRadius:10,border:"0.5px solid "+sc.promptBorder,background:sc.promptBg,backdropFilter:"blur(8px)",WebkitBackdropFilter:"blur(8px)",color:"#475569",cursor:"pointer",transition:"all 0.15s",lineHeight:1.5}}>
                      <span style={{display:"inline-block",width:5,height:5,borderRadius:"50%",background:sc.accent,marginRight:8,position:"relative",top:-1,opacity:0.6}}/>
                      {p}
                    </button>
                  ))}
                </div>
              )}
            </div>
          )}

          {/* Textarea */}
          <textarea
            ref={textareaRef}
            value={answers[currentIndex] || ""}
            onChange={e => setAnswers(prev => ({...prev,[currentIndex]:e.target.value}))}
            placeholder={currentQuestion.type==="confirm" ? "請確認或說明需調整之處⋯" : "請輸入您的回覆⋯"}
            style={S.textarea}
            rows={4}
          />
        </div>
      </div>

      {/* Bottom nav */}
      <div className="glass-bar" style={{borderTop:"0.5px solid rgba(0,0,0,0.04)",padding:"10px 16px"}} >
        <div className="safe-bottom" style={{maxWidth:480,margin:"0 auto",display:"flex",alignItems:"center",gap:6}}>
          <button onClick={goPrev} style={{...S.btnText,display:"flex",alignItems:"center",gap:2}}>
            <ChevronLeft/> 上一題
          </button>
          <button onClick={goNext} style={{...S.btnText,fontSize:12,color:"#CBD5E1"}}>跳過</button>
          <div style={{flex:1}}/>
          <button onClick={goNext} style={{...S.btnPrimary,display:"flex",alignItems:"center",gap:4}}>
            {currentIndex === total - 1 ? (<><CheckIcon/> 完成</>) : (<>下一題 <ChevronRight/></>)}
          </button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
